<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Page Dictionary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <style>
        body {
             background: linear-gradient(to right, #2ecc71 50%, #f1c40f 50%)
            
        }
        .content-box {
            display: flex;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-top: 20px;
            min-height: 50vh;
            width: 50%;
            align-items: center;
            justify-content: center;

        }
        .box-contents{
            display: flex;
            flex-direction: column;
            margin-top: 20px;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .text-center{
            font-family: "Times New Roman", Times, serif;
            font-weight: bold;
        }
    </style>
    
</head>
<body>



    <div class="main-content">
        <div class="container mt-5">
            <h1 class="text-center mb-4">Free Vintage Dictionary Page For Crafts !</h1>
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <form id="search-form">
                        <div class="mb-3">
                            <input type="text" name="word" id="word-input" class="form-control" placeholder="Enter a word to search..." required >
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="content-box" id="result-box">
            <div class="box-contents">
                <div id="loading" style="display: none;" class="text-center">
                    Searching.........
                </div>
                <div id="placeholder-text">
                    Search results will be displayed here.....
                </div>
                <div id="result-content">    

                </div>

            </div>

        </div>
    </div>

<script src="index.js"></script>
</body>
</html>
